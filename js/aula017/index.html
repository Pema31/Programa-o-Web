<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <div id="inicio">
        <h1>Quiz JavaScript</h1>

        <button id="btnIniciar">
            Iniciar Quiz
        </button>
    </div>

    <div id="quiz" hidden>

        <div id="progresso"></div>

        <div class="barra">
            <div id="barraProgresso"></div>
        </div>

        <div id="timer"></div>

        <h2 id="pergunta"></h2>

        <div id="opcoes"></div>

    </div>

    <div id="resultado" hidden></div>

</div>

<script src="script.js"></script>
</body>
</html>
